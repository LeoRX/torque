name: Build & Publish Docker Image

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Lint, scan, build, push
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── PHP lint ──────────────────────────────────────────────────────────────
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: PHP syntax check
        run: |
          echo "Checking PHP syntax..."
          find . -name "*.php" \
            ! -path "./.git/*" \
            -print0 | xargs -0 -n1 php -l
          echo "All PHP files OK."

      # ── Secret scan ───────────────────────────────────────────────────────────
      # Fail the build if any PHP file contains what looks like a real credential.
      # creds.php is gitignored so it can't be committed, but this is a safety net.
      # Notes on patterns chosen:
      #   AIzaSy   — Google API key prefix (39-char key follows)
      #   dckr_pat_ — Docker Hub personal access token prefix
      #   ghp_      — GitHub personal access token prefix
      #   sk-ant- is intentionally excluded: it appears in placeholder/help text
      #   in settings.php and get_settings.php, which are not actual credentials.
      - name: Secret scan
        run: |
          echo "Scanning for accidental credentials..."
          if grep -rn --include="*.php" \
            -e "AIzaSy" \
            -e "dckr_pat_" \
            -e "ghp_" \
            .; then
            echo "ERROR: Credential pattern found in committed PHP file." >&2
            exit 1
          fi
          echo "Secret scan passed."

      # ── Docker metadata ───────────────────────────────────────────────────────
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: leorx/open-torque-viewer
          tags: |
            type=raw,value=latest
            type=raw,value={{date 'YYYY-MM-DD'}}

      # ── Set up Docker Buildx (needed for GHA cache backend) ──────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Docker Hub login ──────────────────────────────────────────────────────
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── QEMU for cross-platform build (arm64 on amd64 runner) ───────────────
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      # ── Build & push multi-arch :latest + date tag (amd64 + arm64) ──────────
      - name: Build and push multi-arch image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64/v8
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=leorx/open-torque-viewer:buildcache
          cache-to: type=registry,ref=leorx/open-torque-viewer:buildcache,mode=max

      # ── Build & push single-platform :arm64 tag ───────────────────────────────
      # Some Docker daemons (e.g. on ARM NAS) strictly require variant="v8" in the
      # manifest list but buildx QEMU cross-builds leave the variant field empty.
      # A single-platform image has no manifest list, so variant matching is
      # bypassed entirely. The NAS Portainer stack uses this tag.
      - name: Build and push arm64-only image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64/v8
          push: true
          tags: leorx/open-torque-viewer:arm64
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=leorx/open-torque-viewer:buildcache
