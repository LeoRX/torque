name: Build & Publish Docker Image

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Lint, scan, build, push
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── PHP lint ──────────────────────────────────────────────────────────────
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: PHP syntax check
        run: |
          echo "Checking PHP syntax..."
          find . -name "*.php" \
            ! -path "./.git/*" \
            -print0 | xargs -0 -n1 php -l
          echo "All PHP files OK."

      # ── Secret scan ───────────────────────────────────────────────────────────
      # Fail the build if any PHP file contains what looks like a real credential.
      # creds.php is gitignored so it can't be committed, but this is a safety net.
      - name: Secret scan
        run: |
          echo "Scanning for accidental credentials..."
          if grep -rn --include="*.php" \
            -e "leor14051981" \
            -e "AIzaSy" \
            -e "Y!awIxb2zTu3ZvSfoUSf6" \
            .; then
            echo "ERROR: Credential pattern found in committed PHP file." >&2
            exit 1
          fi
          echo "Secret scan passed."

      # ── Docker metadata ───────────────────────────────────────────────────────
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: leorx/open-torque-viewer
          tags: |
            type=raw,value=latest
            type=raw,value={{date 'YYYY-MM-DD'}}

      # ── Docker Hub login ──────────────────────────────────────────────────────
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── Build & push ──────────────────────────────────────────────────────────
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
